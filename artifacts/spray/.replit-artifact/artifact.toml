kind = "web"
previewPath = "/"
title = "Spray — Solana Tip Jar"
version = "1.0.0"
id = "artifacts/spray"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22609

[services.development]
run = "pnpm --filter @workspace/spray run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/spray", "run", "build" ]
publicDir = "artifacts/spray/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22609"
BASE_PATH = "/"
